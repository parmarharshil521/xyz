<!DOCTYPE html>
<html>
<head>
    <title>For You 💖</title>
    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            font-family: Arial;
            text-align: center;
            padding: 50px;
            color: #333;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
        h1 {
            color: #ff4d6d;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Hey Bestie 🥺</h1>
    <p>I know you're upset with me...</p>
    <p>But I just want you to know that you really matter to me ❤️</p>
    <p>I miss our talks, our laughs, everything...</p>
    <p>I’m really sorry if I hurt you 😔</p>
    <p>Please forgive me... and smile again 😊</p>
    <p>– Your idiot friend 💙</p>
</div>

</body>
</html>
